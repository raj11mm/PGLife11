<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Best PG's in Delhi | PG Life</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://use.fontawesome.com/releases/v5.11.2/css/all.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <link href="css/common.css" rel="stylesheet" />
    <link href="css/property_list.css" rel="stylesheet" />
    <link href="css/modern.css" rel="stylesheet" />
</head>
<body>
    <div class="header sticky-top">
        <nav class="navbar navbar-expand-md navbar-light">
            <a class="navbar-brand" href="home.html"><img src="img/logo.png" /></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#my-navbar"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse justify-content-end" id="my-navbar">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="explore.html"><i class="fas fa-compass"></i>Explore</a></li>
                </ul>
            </div>
        </nav>
    </div>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb py-2">
            <li class="breadcrumb-item"><a href="home.html">Home</a></li>
            <li class="breadcrumb-item active" aria-current="page">Delhi</li>
        </ol>
    </nav>
    <div class="page-container">
        <div class="section-title">
            <h3 class="mb-0">Top PGs in Delhi</h3>
        </div>
        <div class="property-card row">
            <div class="image-container col-md-4"><img src="img/properties/1/1d4f0757fdb86d5f.jpg" /></div>
            <div class="content-container col-md-8">
                <div class="detail-container">
                    <div class="property-name">North Campus Comfort PG</div>
                    <div class="property-address">GTB Nagar, Delhi, 110009</div>
                    <div class="property-gender"><img src="img/unisex.png" /></div>
                </div>
                <div class="row no-gutters">
                    <div class="rent-container col-6"><div class="rent">Rs 11,500/-</div><div class="rent-unit">per month</div></div>
                    <div class="button-container col-6"><a href="property_detail.html" class="btn btn-primary">View</a></div>
                </div>
            </div>
        </div>
        <div class="property-card row">
            <div class="image-container col-md-4"><img src="img/properties/1/eace7b9114fd6046.jpg" /></div>
            <div class="content-container col-md-8">
                <div class="detail-container">
                    <div class="property-name">South Delhi Stay Hub</div>
                    <div class="property-address">Malviya Nagar, Delhi, 110017</div>
                    <div class="property-gender"><img src="img/female.png" /></div>
                </div>
                <div class="row no-gutters">
                    <div class="rent-container col-6"><div class="rent">Rs 13,200/-</div><div class="rent-unit">per month</div></div>
                    <div class="button-container col-6"><a href="property_detail_2.html" class="btn btn-primary">View</a></div>
                </div>
            </div>
        </div>

    <script src="js/jquery.js"></script>
    <script src="js/bootstrap.min.js"></script>
